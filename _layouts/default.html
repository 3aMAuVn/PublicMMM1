<!DOCTYPE html>
<html lang="{{ page.lang | default: 'en' }}">
<head>
  <script>window.__MMM_LANG = {{ page.lang | default: 'en' | jsonify }};</script>
  {% include head.html %}

  <!-- PWA for Magic Math Master main website -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0b1f4d">

  <link rel="icon" type="image/png" sizes="192x192" href="/assets/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/assets/icon-512.png">
<link rel="apple-touch-icon" href="/assets/icon-192.png">

<meta name="theme-color" content="#0b1f4d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Magic Math Master">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>

<body class="{{ page.body_class }}" data-page-lang="{{ page.lang | default: 'en' }}" data-pricing-lang="{{ page.pricing_lang | default: page.lang | default: 'en' }}">
  {% include topbar.html %}
  {{ content }}
  {% include footer.html %}
  {% include scripts.html %}

  <!-- Register service worker -->
  <script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("/service-worker.js")
        .then(function () {
          console.log("Magic Math Master service worker registered");
        })
        .catch(function (error) {
          console.log("Service worker registration failed:", error);
        });
    });
  }
  </script>
</body>
</html>
